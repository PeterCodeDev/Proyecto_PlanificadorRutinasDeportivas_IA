<div class="min-h-screen flex flex-col items-center justify-center w-full p-6 bg-slate-50 dark:bg-slate-900">

        <p class="text-xs text-slate-500 font-bold uppercase tracking-widest">The Kinetic Gallery</p>
    </div>

    <div class="bg-white dark:bg-slate-800 w-full max-w-md rounded-[2rem] shadow-xl shadow-slate-200/50 dark:shadow-none p-6 md:p-8">
        
        <div class="flex bg-slate-50 dark:bg-slate-700/50 p-1 rounded-2xl mb-8">
            <button class="flex-1 bg-white dark:bg-slate-800 text-blue-600 dark:text-blue-400 font-bold py-3 rounded-xl shadow-sm text-sm transition-all">
                Entrar
            </button>
            <button routerLink="/register" class="flex-1 text-slate-500 dark:text-slate-400 font-bold py-3 rounded-xl text-sm hover:text-slate-700 transition-colors">

            </button>
        </div>

        <div class="mb-6">
            <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2 px-1">
                Correo Electrónico
            </label>
            <div class="relative">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
                <input type="email" 
                       placeholder="ejemplo@smart.com" 
                       class="w-full bg-slate-50 dark:bg-slate-900/50 border-none rounded-2xl py-4 pl-12 pr-4 text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-400/70 font-medium">

        </div>

        <div class="mb-8">
            <div class="flex justify-between items-center mb-2 px-1">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">

                </label>
                </div>
            <div class="relative">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
                <input type="password" 
                       placeholder="••••••••" 
                       class="w-full bg-slate-50 dark:bg-slate-900/50 border-none rounded-2xl py-4 pl-12 pr-4 text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-400/70 tracking-widest">
            </div>

        <button routerLink="/track" 
                class="w-full bg-blue-600 text-white py-4 rounded-full font-bold text-sm hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-600/30 transition-all active:scale-[0.98]">

        </button>

    <p class="text-center text-slate-500 dark:text-slate-400 text-xs mt-8 max-w-[250px] leading-relaxed">
        Al entrar, aceptas nuestros <br> 
        <span class="font-bold text-slate-700 dark:text-slate-300 cursor-pointer hover:underline">Términos de Servicio</span> y
