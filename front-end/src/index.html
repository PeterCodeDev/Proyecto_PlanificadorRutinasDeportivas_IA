<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Smart Workout</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-dim": "#d9dadb", "outline": "#727785", "primary": "#0058be",
            "on-surface-variant": "#424754", "surface-container-low": "#f3f4f5",
            "surface-container-highest": "#e1e3e4", "surface-container-high": "#e7e8e9",
            "surface-container-lowest": "#ffffff", "on-surface": "#191c1d",
            "on-primary": "#ffffff", "secondary": "#006c49",
            "surface-container": "#edeeef", "surface": "#f8f9fa",
            "primary-container": "#2170e4"
          },
          borderRadius: {
            "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "xxl": "1.5rem", "full": "9999px"
          },
          fontFamily: {
            headline: ["Manrope"], body: ["Inter"], label: ["Inter"]
          }
        }
      }
    }
  </script>
  
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .filled-icon {
      font-variation-settings: 'FILL' 1;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8f9fa;
    }
    h1, h2, h3 {
      font-family: 'Manrope', sans-serif;
    }
    .bg-login-gradient {
      background: linear-gradient(135deg, #0058be 0%, #2170e4 100%);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6">
  <app-root></app-root>
</body>
</html>
